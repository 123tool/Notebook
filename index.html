<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEOTERM_NOTEBOOK_V1</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #ccff00; /* Cyber Lime */
            --bg: #ffffff;
            --dark: #000000;
            --surface: #ffffff;
            --text: #000000;
            --border: 4px solid #000000;
            --shadow: 8px 8px 0px #000000;
            --shadow-sm: 4px 4px 0px #000000;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
            --primary: #ccff00;
            --shadow: 8px 8px 0px #ccff00;
            --shadow-sm: 4px 4px 0px #ccff00;
            --border: 4px solid #ffffff;
        }

        * { box-sizing: border-box; tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            font-family: 'Roboto Mono', monospace;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(var(--dark) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Views */
        .view {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            background: var(--bg);
        }
        .view.active { display: flex; flex-direction: column; animation: glitch 0.2s ease; }

        @keyframes glitch {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(0); }
        }

        /* Splash Screen */
        #splash-view { justify-content: center; align-items: center; z-index: 999; background: var(--primary); color: black; }
        .splash-logo { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; font-weight: 900; text-transform: uppercase; }

        /* Auth */
        .auth-container { padding: 40px; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .auth-container h2 { font-family: 'Space Grotesk', sans-serif; font-size: 2.2rem; text-transform: uppercase; margin-bottom: 20px; }

        .input-field {
            width: 100%; padding: 15px; border: var(--border); background: var(--surface);
            font-weight: bold; box-shadow: var(--shadow-sm); outline: none; color: var(--text); margin-bottom: 20px;
        }

        .btn {
            background: var(--primary); color: black; padding: 18px; border: var(--border);
            font-weight: 900; text-transform: uppercase; box-shadow: var(--shadow-sm);
            cursor: pointer; transition: 0.1s;
        }
        .btn:active { transform: translate(4px, 4px); box-shadow: none; }
        .btn-text { background: transparent; border: none; box-shadow: none; text-decoration: underline; margin-top: 15px; color: var(--text); }

        /* Home Header */
        header {
            border-bottom: var(--border); padding: 20px; display: flex;
            justify-content: space-between; align-items: center;
            background: var(--primary); color: black; font-weight: 900;
        }

        .search-bar { padding: 20px; }
        .search-input {
            width: 100%; padding: 15px; border: var(--border);
            background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm);
        }

        /* Notes Grid */
        #notes-list { padding: 10px 20px 100px 20px; overflow-y: auto; flex: 1; }
        .note-card {
            background: var(--surface); border: var(--border); padding: 20px;
            margin-bottom: 20px; box-shadow: var(--shadow); cursor: pointer;
            position: relative; transition: 0.2s;
        }
        .note-card:hover { transform: scale(1.02) rotate(-1deg); }
        .note-title-text { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 900; text-transform: uppercase; }
        
        /* FAB */
        .fab {
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
            background: var(--primary); border: var(--border); box-shadow: var(--shadow-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold; color: black; cursor: pointer; z-index: 10;
        }

        /* Editor */
        .editor-header { border-bottom: var(--border); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .editor-title {
            width: 100%; font-size: 1.8rem; padding: 20px; border: none;
            border-bottom: var(--border); background: transparent; color: var(--text);
            font-weight: 900; font-family: 'Space Grotesk', sans-serif; outline: none;
        }
        .editor-content {
            flex: 1; padding: 20px; border: none; background: transparent;
            color: var(--text); font-size: 1.1rem; resize: none; outline: none; font-family: inherit;
        }

        /* Modals & Toasts */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100;
            display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--surface); border: var(--border); width: 90%; max-width: 350px; padding: 25px; box-shadow: var(--shadow); }

        #toast {
            visibility: hidden; background: var(--dark); color: var(--primary);
            border: 2px solid var(--primary); padding: 15px; font-weight: bold;
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000;
        }
        #toast.show { visibility: visible; animation: fadeInOut 2.5s; }
        @keyframes fadeInOut { 0%, 100% { opacity: 0; } 15%, 85% { opacity: 1; } }

        .icon-btn { background: none; border: none; color: inherit; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash-view" class="view active">
        <div class="splash-logo">NEOTERM_OS</div>
    </div>

    <div id="login-view" class="view">
        <div class="auth-container">
            <h2>LOGIN_ACCESS</h2>
            <form id="login-form">
                <input type="email" id="login-email" class="input-field" placeholder="EMAIL_ADDR" required>
                <input type="password" id="login-password" class="input-field" placeholder="PASSWORD" required>
                <button type="submit" class="btn">GRANT_ACCESS</button>
            </form>
            <button class="btn btn-text" onclick="router.navigate('signup')">CREATE_NEW_IDENTITY</button>
        </div>
    </div>

    <div id="signup-view" class="view">
        <div class="auth-container">
            <h2>NEW_IDENTITY</h2>
            <form id="signup-form">
                <input type="text" id="signup-name" class="input-field" placeholder="FULL_NAME" required>
                <input type="email" id="signup-email" class="input-field" placeholder="EMAIL_ADDR" required>
                <input type="password" id="signup-password" class="input-field" placeholder="PASSWORD_MIN_6" required minlength="6">
                <button type="submit" class="btn">INITIALIZE</button>
            </form>
            <button class="btn btn-text" onclick="router.navigate('login')">BACK_TO_LOGIN</button>
        </div>
    </div>

    <div id="home-view" class="view">
        <header>
            <span>CORE_DATABASE</span>
            <div>
                <button class="icon-btn" onclick="themeManager.toggle()"><i class="material-icons">brightness_4</i></button>
                <button class="icon-btn" onclick="auth.logout()"><i class="material-icons" style="margin-left:15px">power_settings_new</i></button>
            </div>
        </header>
        <div class="search-bar">
            <input type="text" id="search-input" class="search-input" placeholder="SCAN_DATABASE...">
        </div>
        <div id="notes-list"></div>
        <div class="fab" onclick="notesApp.openEditor()">+</div>
    </div>

    <div id="editor-view" class="view">
        <div class="editor-header">
            <button class="icon-btn" onclick="router.navigate('home')"><i class="material-icons">close</i></button>
            <div style="display:flex; gap: 20px;">
                <button class="icon-btn" id="btn-lock" onclick="notesApp.toggleLockUI()"><i class="material-icons">lock_open</i></button>
                <button class="icon-btn" id="btn-delete" onclick="notesApp.confirmDelete()"><i class="material-icons">delete_forever</i></button>
                <button class="icon-btn" onclick="notesApp.saveNote()"><i class="material-icons">save</i></button>
            </div>
        </div>
        <input type="text" id="note-title" class="editor-title" placeholder="NOTE_TITLE">
        <textarea id="note-content" class="editor-content" placeholder="ENTER_ENCRYPTED_DATA_HERE..."></textarea>
    </div>

    <div id="modal-passcode" class="modal-overlay">
        <div class="modal">
            <h3 id="passcode-title" style="margin-top:0">SECURITY_CHECK</h3>
            <input type="password" id="passcode-input" class="input-field" placeholder="4-DIGIT PIN" maxlength="4" style="text-align:center; letter-spacing:10px;">
            <div style="display:flex; justify-content: flex-end; gap: 10px;">
                <button class="btn btn-text" onclick="ui.closeModals()">CANCEL</button>
                <button class="btn" id="passcode-confirm-btn">CONFIRM</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // ==========================================
        // FIREBASE CONFIGURATION
        // Isi data di bawah ini dari Firebase Console kamu
        // ==========================================
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_KAMU",
            authDomain: "ISI_AUTH_DOMAIN_KAMU",
            databaseURL: "ISI_DATABASE_URL_KAMU",
            projectId: "ISI_PROJECT_ID_KAMU",
            storageBucket: "ISI_STORAGE_BUCKET_KAMU",
            messagingSenderId: "ISI_MESSAGING_SENDER_ID_KAMU",
            appId: "ISI_APP_ID_KAMU"
        };

        // Initialize Firebase
        if (firebaseConfig.apiKey !== "ISI_API_KEY_KAMU") {
            firebase.initializeApp(firebaseConfig);
        } else {
            console.error("Firebase Config belum diisi!");
        }
        
        const db = firebase.database();
        const firebaseAuth = firebase.auth();

        const state = { user: null, notes: [], currentNote: null, currentNoteId: null, isEditing: false };

        const router = {
            navigate: (viewId) => {
                document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
                document.getElementById(viewId + '-view').classList.add('active');
            }
        };

        const ui = {
            showToast: (msg) => {
                const x = document.getElementById("toast");
                x.innerText = msg;
                x.className = "show";
                setTimeout(() => { x.className = ""; }, 2500);
            },
            closeModals: () => {
                document.querySelectorAll('.modal-overlay').forEach(el => el.classList.remove('active'));
                document.getElementById('passcode-input').value = '';
            }
        };

        const themeManager = {
            init: () => {
                const saved = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', saved);
            },
            toggle: () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            }
        };

        const auth = {
            init: () => {
                firebaseAuth.onAuthStateChanged((user) => {
                    if (user) {
                        state.user = user;
                        router.navigate('home');
                        notesApp.listenForNotes();
                    } else {
                        setTimeout(() => router.navigate('login'), 1500);
                    }
                });
            },
            login: (email, password) => {
                firebaseAuth.signInWithEmailAndPassword(email, password).catch(e => ui.showToast(e.message));
            },
            signup: (email, password, name) => {
                firebaseAuth.createUserWithEmailAndPassword(email, password)
                    .then(cred => cred.user.updateProfile({ displayName: name }))
                    .catch(e => ui.showToast(e.message));
            },
            logout: () => firebaseAuth.signOut()
        };

        const notesApp = {
            listenForNotes: () => {
                db.ref('users/' + state.user.uid + '/notes').on('value', snap => {
                    const data = snap.val();
                    state.notes = data ? Object.keys(data).map(k => ({id: k, ...data[k]})) : [];
                    state.notes.sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
                    notesApp.renderList(state.notes);
                });
            },
            renderList: (notes) => {
                const list = document.getElementById('notes-list');
                list.innerHTML = notes.length ? '' : '<div style="text-align:center; padding:50px; opacity:0.5">DATABASE_EMPTY</div>';
                notes.forEach(n => {
                    const card = document.createElement('div');
                    card.className = 'note-card';
                    card.innerHTML = `
                        <div class="note-title-text">${n.title}</div>
                        <div style="opacity:0.6">${n.locked ? '---LOCKED_DATA---' : n.content.substring(0,40)+'...'}</div>
                        ${n.locked ? '<i class="material-icons" style="position:absolute; top:20px; right:20px">lock</i>' : ''}
                    `;
                    card.onclick = () => n.locked ? notesApp.promptPasscode(n) : notesApp.openEditor(n);
                    list.appendChild(card);
                });
            },
            openEditor: (note = null) => {
                state.isEditing = !!note;
                state.currentNote = note;
                state.currentNoteId = note ? note.id : null;
                document.getElementById('note-title').value = note ? note.title : '';
                document.getElementById('note-content').value = note ? note.content : '';
                document.getElementById('btn-lock').innerHTML = note?.locked ? '<i class="material-icons">lock</i>' : '<i class="material-icons">lock_open</i>';
                document.getElementById('btn-delete').style.display = note ? 'block' : 'none';
                router.navigate('editor');
            },
            saveNote: () => {
                const title = document.getElementById('note-title').value;
                const content = document.getElementById('note-content').value;
                if(!title) return ui.showToast('ERR: TITLE_EMPTY');

                // Visual effect
                document.body.style.filter = 'invert(1)';
                setTimeout(() => document.body.style.filter = '', 150);

                const data = {
                    title: title.toUpperCase(),
                    content,
                    locked: state.currentNote?.locked || false,
                    passcode: state.currentNote?.passcode || null,
                    updatedAt: new Date().toISOString()
                };

                const ref = db.ref('users/' + state.user.uid + '/notes');
                const action = state.isEditing ? ref.child(state.currentNoteId).update(data) : ref.push(data);
                
                action.then(() => {
                    ui.showToast('DATA_SYNC_COMPLETE');
                    router.navigate('home');
                });
            },
            confirmDelete: () => {
                if(confirm("DELETE_PERMANENTLY?")) {
                    db.ref('users/' + state.user.uid + '/notes/' + state.currentNoteId).remove()
                        .then(() => router.navigate('home'));
                }
            },
            toggleLockUI: () => {
                if(state.currentNote?.locked) {
                    state.currentNote.locked = false;
                    state.currentNote.passcode = null;
                    document.getElementById('btn-lock').innerHTML = '<i class="material-icons">lock_open</i>';
                    ui.showToast('SECURITY_DISABLED');
                } else {
                    const pin = prompt("SET_4_DIGIT_PIN:");
                    if(pin && pin.length === 4) {
                        if(!state.currentNote) state.currentNote = {};
                        state.currentNote.locked = true;
                        state.currentNote.passcode = pin;
                        document.getElementById('btn-lock').innerHTML = '<i class="material-icons">lock</i>';
                        ui.showToast('SECURITY_ENABLED');
                    }
                }
            },
            promptPasscode: (note) => {
                const modal = document.getElementById('modal-passcode');
                modal.classList.add('active');
                document.getElementById('passcode-confirm-btn').onclick = () => {
                    if(document.getElementById('passcode-input').value === note.passcode) {
                        ui.closeModals();
                        notesApp.openEditor(note);
                    } else {
                        ui.showToast('INVALID_ACCESS_PIN');
                    }
                };
            }
        };

        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            auth.login(document.getElementById('login-email').value, document.getElementById('login-password').value);
        };
        document.getElementById('signup-form').onsubmit = (e) => {
            e.preventDefault();
            auth.signup(document.getElementById('signup-email').value, document.getElementById('signup-password').value, document.getElementById('signup-name').value);
        };
        document.getElementById('search-input').onkeyup = (e) => {
            const term = e.target.value.toUpperCase();
            notesApp.renderList(state.notes.filter(n => n.title.includes(term)));
        };

        window.onload = () => { themeManager.init(); auth.init(); };
    </script>
</body>
</html>
